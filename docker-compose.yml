services:
  liquidity:
    container_name: liquidity-ai
    build: .
    ports:
      # Host port 4001 → Container port 3001
      # This avoids conflicts with `npm run dev` which uses 3001
      # Access at: http://localhost:4001  or  http://<YOUR_IP>:4001
      - "0.0.0.0:4001:3001"
    volumes:
      - liquidity_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGIN=*
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-strong-secret-in-production}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  liquidity_data:
